name: Deploy App to EC2

on:
  # Manual trigger only — go to GitHub Actions tab → "Deploy App to EC2" → "Run workflow"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # ── 1. SSH into EC2 and redeploy ─────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port:        22
          # Generous timeout — docker build on t2.micro can take up to 15 min
          command_timeout: 20m
          script: |
            set -e
            echo "=== Deployment started at $(date) ==="

            cd /home/ubuntu/infra-autofix-agent

            echo "[1/4] Pulling latest code..."
            git pull origin main

            echo "[2/4] Rebuilding and restarting containers..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --build --remove-orphans

            echo "[3/4] Pruning unused Docker images to save disk space..."
            docker image prune -f

            echo "[4/4] Ensuring DuckDNS cron job is installed..."
            chmod +x /home/ubuntu/infra-autofix-agent/scripts/update_duckdns.sh
            CRON_JOB="*/5 * * * * DUCKDNS_DOMAIN=${{ secrets.DUCKDNS_DOMAIN }} DUCKDNS_TOKEN=${{ secrets.DUCKDNS_TOKEN }} /home/ubuntu/infra-autofix-agent/scripts/update_duckdns.sh >> /home/ubuntu/duckdns.log 2>&1"
            # Add cron job only if not already present
            ( crontab -l 2>/dev/null | grep -v 'update_duckdns'; echo "$CRON_JOB" ) | crontab -
            echo "DuckDNS cron job installed."

            echo "=== Deployment finished at $(date) ==="

            echo ""
            echo "Running containers:"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
